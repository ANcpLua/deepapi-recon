name: contract-audit

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write        # required to upload SARIF to code scanning

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Contract tests
        run: python -m unittest discover -s tests -v

      - name: Audit the error contract → SARIF + summary
        run: |
          # audit the naive baseline (the demo: three findings)
          python contract_audit.py --target tests/_naive_client.py \
            --out results.sarif --summary audit-summary.md
          # and prove the shipped client is clean
          python contract_audit.py --target deepapi_client.py --out fixed.sarif > /dev/null

      - name: Render visual job summary
        run: |
          python -m pip install --quiet sarif-tools
          cat audit-summary.md >> "$GITHUB_STEP_SUMMARY"
          {
            echo ''
            echo '<details><summary>sarif-tools counts</summary>'
            echo ''
            echo '```'
            sarif summary results.sarif
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
          sarif html -o sarif-report.html results.sarif

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: contract-audit
          path: |
            results.sarif
            sarif-report.html
            audit-summary.md

      - name: Upload SARIF to code scanning
        # Private repos need GitHub Advanced Security for this; keep it best-effort
        # so the run stays green and the visual summary + artifacts always land.
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          sarif_file: results.sarif
          category: deepapi-contract-audit
